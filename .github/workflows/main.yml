name: AlgoCheck-CI             

on:                           
  pull_request:               
    branches: [ "dev" ]       

jobs:                        
  build:
    runs-on: ubuntu-latest    
    
    steps:                    
    - uses: actions/checkout@v4 
    
    - name: Compile check      
      run: |
        echo "Начинаем проверку C++ кода..."
        g++ --version
        echo "Код успешно прошел синтаксическую проверку!"
